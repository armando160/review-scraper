name: Review Pipeline

on:
  schedule:
    # 4 runs per day — 6AM, 12PM, 6PM, 12AM EST (UTC-5 → +5h offset)
    # GitHub Actions cron uses UTC
    - cron: '0 11 * * *'   # 6:00 AM EST
    - cron: '0 17 * * *'   # 12:00 PM EST
    - cron: '0 23 * * *'   # 6:00 PM EST
    - cron: '0 5 * * *'    # 12:00 AM EST
  workflow_dispatch:         # manual trigger from GitHub Actions UI
    inputs:
      asins_override:
        description: 'Comma-separated ASINs to force-scrape (leave blank for normal queue)'
        required: false
        default: ''
      mode:
        description: 'Scrape mode: basic | full | max'
        required: false
        default: 'max'

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run pipeline
        env:
          SUPABASE_URL:    ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY:    ${{ secrets.SUPABASE_KEY }}
          GROQ_API_KEY:    ${{ secrets.GROQ_API_KEY }}
          MONDAY_TOKEN:    ${{ secrets.MONDAY_TOKEN }}
          GOOGLE_SA_JSON:  ${{ secrets.GOOGLE_SA_JSON }}
        run: python pipeline.py

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: pipeline-logs-${{ github.run_id }}
          path: '*.log'
          retention-days: 7
